version: "3.9"

services:
  secure-auth:
    build: .
    container_name: secure-auth
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-me-32-byte-secret-in-prod!}
      - DATA_DIR=/data
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_BASE_DURATION=30s
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=168h
      - RATE_LIMIT_REQUESTS=20
      - RATE_LIMIT_WINDOW=1m
    volumes:
      - auth-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  auth-data:
    driver: local
